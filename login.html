<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(-45deg, #ff0080, #8000ff, #00ffcc, #ff6600);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            color: white;
            padding: 20px;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: #1e1e1e;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
            text-align: center;
        }
        h2 {
            margin-bottom: 20px;
            color: #ff4081;
        }
        .input-group {
            position: relative;
            width: 100%;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            background: #333;
            color: white;
            transition: 0.3s;
        }
        input:focus {
            outline: none;
            background: #444;
        }
        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #bbb;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #ff4081;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background: #d81b60;
        }
        .toggle {
            margin-top: 15px;
            cursor: pointer;
            color: #ff4081;
            font-size: 14px;
        }
        .error {
            color: red;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container" id="form-container">
        <h2 id="form-title">Login</h2>
        <form id="auth-form">
            <input type="email" id="email" placeholder="Email" required>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
                <span class="toggle-password" onclick="togglePassword()">👁</span>
            </div>
            <p class="error" id="error-message"></p>
            <button type="submit">Submit</button>
        </form>
        <p class="toggle" onclick="toggleForm()">Don't have an account? Sign Up</p>
    </div>

    <script>
        let users = {}; // Temporary in-memory storage

        function toggleForm() {
            let title = document.getElementById("form-title");
            let toggleText = document.querySelector(".toggle");
            let email = document.getElementById("email");
            let password = document.getElementById("password");
            let errorMessage = document.getElementById("error-message");

            // Reset fields on form switch
            email.value = "";
            password.value = "";
            errorMessage.innerText = "";

            if (title.innerText === "Login") {
                title.innerText = "Sign Up";
                toggleText.innerText = "Already have an account? Login";
            } else {
                title.innerText = "Login";
                toggleText.innerText = "Don't have an account? Sign Up";
            }
        }

        function togglePassword() {
            let passwordField = document.getElementById("password");
            passwordField.type = passwordField.type === "password" ? "text" : "password";
        }

        document.getElementById("auth-form").addEventListener("submit", function(event) {
            event.preventDefault();
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;
            let errorMessage = document.getElementById("error-message");

            if (!email.includes("@") || !email.includes(".")) {
                errorMessage.innerText = "Enter a valid email!";
                return;
            }

            if (document.getElementById("form-title").innerText === "Login") {
                if (users[email] && users[email] === password) {
                    console.log("Login Success");
                    window.location.href = "profile.html"; // Redirect
                } else {
                    errorMessage.innerText = "Invalid email or password!";
                }
            } else {
                if (users[email]) {
                    errorMessage.innerText = "User already exists!";
                } else {
                    users[email] = password;
                    console.log("Signup Successful! Now login.");
                    toggleForm();
                }
            }
        });
    </script>
</body>
</html>
