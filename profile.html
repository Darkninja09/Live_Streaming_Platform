<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <title>Cyborg</title>

    <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/fontawesome.css">
    <link rel="stylesheet" href="assets/css/templatemo-cyborg-gaming.css">
    <link rel="stylesheet" href="assets/css/owl.css">
    <link rel="stylesheet" href="assets/css/animate.css">
    <link rel="stylesheet" href="https://unpkg.com/swiper@7/swiper-bundle.min.css"/>

    <style>
        /* Popup Styles */
        #authPopup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e1e1e;
            padding: 25px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
            z-index: 1000;
            color: white;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        /* Overlay */
        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
        }

        /* Tab Buttons */
        .auth-tabs {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
        }

        .auth-tabs .tab-btn {
            width: 50%;
            padding: 10px;
            background: #444;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .auth-tabs .tab-btn.active {
            background: #ffcc00;
            color: black;
        }

        /* Form Styles */
        #authPopup input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #555;
            background: #2e2e2e;
            color: white;
            outline: none;
        }

        #authPopup .login-btn {
            background: #ffcc00;
            color: black;
            width: 90%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        #authPopup .login-btn:hover {
            background: #e6b800;
            transform: scale(1.05);
        }

        #authPopup .close-btn {
            background: #ff4444;
            color: white;
            width: 90%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        #authPopup .close-btn:hover {
            background: #cc0000;
            transform: scale(1.05);
        }

        /* Error Message */
        .error {
            color: red;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="header-area header-sticky">
        <div class="container">
            <nav class="main-nav">
                <a href="index.html" class="logo">
                    <img src="assets/images/logo.png" alt="">
                </a>
                <ul class="nav">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="browse.html">Browse</a></li>
                    <li><a href="details.html">Details</a></li>
                    <li><a href="streams.html">Streams</a></li>
                    <li><a href="profile.html" class="active">Profile <img src="assets/images/profile-header.jpg" alt=""></a></li>
                </ul>
                <a class='menu-trigger'><span>Menu</span></a>
            </nav>
        </div>
    </header>

    <!-- Profile Section -->
    <div class="container">
        <div class="row">
            <div class="col-lg-12">
                <div class="page-content">
                    <div class="main-profile">
                        <div class="row">
                            <div class="col-lg-4">
                                <img src="assets/images/profile.jpg" alt="" style="border-radius: 23px;">
                            </div>
                            <div class="col-lg-4 align-self-center">
                                <div class="main-info header-text">
                                    <span>Offline</span>
                                    <h4>Enjoy the full Experience</h4>
                                    <p>You Haven't Logged In yet. Click Below to Login.</p>
                                    <div class="main-border-button">
                                        <a href="#" onclick="openAuthPopup()">Login / Sign Up</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Authentication Popup -->
    <div id="overlay" onclick="closeAuthPopup()"></div>
    <div id="authPopup">
        <div class="auth-tabs">
            <button class="tab-btn active" onclick="showTab('login')">Login</button>
            <button class="tab-btn" onclick="showTab('signup')">Sign Up</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
            <h2>Login</h2>
            <input type="text" id="loginUsername" placeholder="Username">
            <input type="password" id="loginPassword" placeholder="Password">
            <p class="error" id="loginErrorMessage"></p>
            <button class="login-btn" onclick="login()">Login</button>
        </div>

        <!-- Sign-Up Form -->
        <div id="signupForm" style="display: none;">
            <h2>Sign Up</h2>
            <input type="text" id="signupUsername" placeholder="Username">
            <input type="email" id="signupEmail" placeholder="Email">
            <input type="password" id="signupPassword" placeholder="Password">
            <p class="error" id="signupErrorMessage"></p>
            <button class="login-btn" onclick="signup()">Sign Up</button>
        </div>

        <button class="close-btn" onclick="closeAuthPopup()">Close</button>
    </div>

    <!-- JavaScript -->
    <script>
        function openAuthPopup() {
            document.getElementById("authPopup").style.display = "block";
            document.getElementById("overlay").style.display = "block";
        }

        function closeAuthPopup() {
            document.getElementById("authPopup").style.display = "none";
            document.getElementById("overlay").style.display = "none";
        }

        function showTab(tab) {
            if (tab === 'login') {
                document.getElementById("loginForm").style.display = "block";
                document.getElementById("signupForm").style.display = "none";
                document.querySelector(".tab-btn.active").classList.remove("active");
                document.querySelector(".auth-tabs .tab-btn:nth-child(1)").classList.add("active");
            } else {
                document.getElementById("loginForm").style.display = "none";
                document.getElementById("signupForm").style.display = "block";
                document.querySelector(".tab-btn.active").classList.remove("active");
                document.querySelector(".auth-tabs .tab-btn:nth-child(2)").classList.add("active");
            }
        }

        function login() {
            alert("Login button clicked! (Implement backend authentication)");
            closeAuthPopup();
        }

        function signup() {
            alert("Sign Up button clicked! (Implement backend authentication)");
            closeAuthPopup();
        }
    </script>

</body>
</html>
